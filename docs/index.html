<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bangladesh Job Market Visualizer</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <h1>Bangladesh Job Market Visualizer</h1>

  <div class="controls">
    <button onclick="setMetric('wage_tier')">Wage</button>
    <button onclick="setMetric('education_tier')">Education</button>
    <button onclick="setMetric('ai_exposure_score')">AI Exposure</button>
  </div>

  <div id="chart"></div>
  <div id="tooltip" class="tooltip"></div>

  <script src="./app.js"></script>
</body>
</html>
